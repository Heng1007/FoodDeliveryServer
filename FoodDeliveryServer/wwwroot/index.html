<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heng's Food Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: none;
        }

        .hidden {
            display: none !important;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🍔 Heng's Delivery</a>
            <div class="d-flex">
                <span id="user-info" class="navbar-text text-white me-3 hidden"></span>
                <button id="btn-logout" class="btn btn-light btn-sm hidden" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">

        <div id="loading" class="spinner-border text-primary hidden" role="status"></div>

        <div id="auth-section" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h3 class="text-center mb-3">Welcome</h3>

                    <div id="login-form">
                        <input type="text" id="login-username" class="form-control mb-2" placeholder="Username">
                        <input type="password" id="login-password" class="form-control mb-3" placeholder="Password">
                        <button class="btn btn-primary w-100" onclick="login()">Login</button>
                        <p class="text-center mt-2">
                            <small>No account? <a href="#" onclick="toggleAuth('register')">Register here</a></small>
                        </p>
                    </div>

                    <div id="register-form" class="hidden">
                        <input type="text" id="reg-username" class="form-control mb-2" placeholder="New Username">
                        <input type="password" id="reg-password" class="form-control mb-2" placeholder="Set Password">
                        <select id="reg-role" class="form-select mb-3">
                            <option value="User">I am a Customer (User)</option>
                            <option value="Admin">I am the Boss (Admin)</option>
                        </select>
                        <button class="btn btn-success w-100" onclick="register()">Register Account</button>
                        <p class="text-center mt-2">
                            <small>Already have an account? <a href="#" onclick="toggleAuth('login')">Login here</a></small>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard-section" class="hidden">

            <div class="row mb-4">
                <div class="col-md-12 text-center">
                    <button class="btn btn-outline-primary me-2" onclick="fetchOrders()">🔄 Refresh Orders</button>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#orderModal">➕ Order Food</button>
                </div>
            </div>

            <div class="row" id="orders-container">
            </div>
        </div>
    </div>

    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Recipient Name</label>
                        <input type="text" id="order-name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Delivery Address</label>
                        <input type="text" id="order-address" class="form-control">
                    </div>
                    <hr>
                    <h6>Food Selection (Simulation)</h6>
                    <div class="form-check">
                        <input class="form-check-input food-item" type="checkbox" value="1" data-price="15">
                        <label class="form-check-label">🍔 Classic Burger ($15)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input food-item" type="checkbox" value="2" data-price="5">
                        <label class="form-check-label">🍟 Fries ($5)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input food-item" type="checkbox" value="3" data-price="3">
                        <label class="form-check-label">🥤 Cola ($3)</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createOrder()">Submit Order</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ⚠️⚠️⚠️ Please replace this with your Azure URL, without a trailing slash
        const API_URL = "https://localhost:7035/api";
        //const API_URL = "https://your-app-name.azurewebsites.net/api";

        let token = localStorage.getItem("jwt_token");
        let username = localStorage.getItem("username");

        // Check login status when page loads
        checkLoginStatus();

        function checkLoginStatus() {
            if (token) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                document.getElementById('user-info').innerText = `Hello, ${username}`;
                fetchOrders(); // Auto load orders
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
            }
        }

        // Toggle login/register UI
        function toggleAuth(mode) {
            if (mode === 'register') {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            } else {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            }
        }

        // Register functionality
        async function register() {
            const user = document.getElementById('reg-username').value;
            const pass = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            try {
                const res = await fetch(`${API_URL}/Auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass, role: role })
                });

                if (res.ok) {
                    alert("Registration successful! Please login.");
                    toggleAuth('login');
                } else {
                    alert("Registration failed: " + await res.text());
                }
            } catch (err) { alert("Network Error"); }
        }

        // Login functionality
        async function login() {
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${API_URL}/Auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    const data = await res.text() // Retrieve Token string
                    token = data;
                    username = user;

                    // Save to browser storage to avoid re-login on refresh
                    localStorage.setItem("jwt_token", token);
                    localStorage.setItem("username", username);

                    checkLoginStatus();
                } else {
                    alert("Login failed. Please check username and password.");
                }
            } catch (err) {
                console.error("🔥 Detailed error:", err); // Check this in F12 Console!
                alert("Error: " + err.message);
            }
        }

        // Logout functionality
        function logout() {
            localStorage.removeItem("jwt_token");
            localStorage.removeItem("username");
            token = null;
            location.reload();
        }

        // Fetch orders
        async function fetchOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<p class="text-center">Loading...</p>';

            try {
                const res = await fetch(`${API_URL}/Order`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (res.ok) {
                    const orders = await res.json();
                    container.innerHTML = ""; // Clear loading text

                    if (orders.length === 0) {
                        container.innerHTML = '<p class="text-center text-muted">No orders yet, go place one!</p>';
                        return;
                    }

                    orders.forEach(order => {
                        const date = new Date(order.orderDate).toLocaleString();
                        // Generate card HTML
                        const html = `
                                <div class="col-md-4 mb-3">
                                    <div class="card h-100">
                                        <div class="card-body">
                                            <h5 class="card-title">📦 Order #${order.id}</h5>
                                            <h6 class="card-subtitle mb-2 text-muted">${date}</h6>
                                            <p class="card-text">
                                                <strong>Recipient:</strong> ${order.customerName}<br>
                                                <strong>Address:</strong> ${order.customerAddress}<br>
                                                <strong>Total:</strong> <span class="text-danger fw-bold">$${order.totalAmount}</span>
                                            </p>
                                            <ul class="list-group list-group-flush">
                                                ${order.items.map(i => `<li class="list-group-item d-flex justify-content-between"><span>Meal #${i.foodItemId}</span> <span>x${i.quantity}</span></li>`).join('')}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            `;
                        container.innerHTML += html;
                    });
                } else {
                    if (res.status === 401) logout(); // Auto-kick out if Token expired
                    else alert("Failed to fetch orders");
                }
            } catch (err) { console.error(err); }
        }

        // Create order
        async function createOrder() {
            const name = document.getElementById('order-name').value;
            const address = document.getElementById('order-address').value;

            // Get selected items
            const items = [];
            document.querySelectorAll('.food-item:checked').forEach(checkbox => {
                items.push({
                    foodItemId: parseInt(checkbox.value),
                    quantity: 1, // Default quantity to 1 for now
                    price: parseFloat(checkbox.dataset.price)
                });
            });

            if (items.length === 0) { alert("Please select at least one item!"); return; }

            const payload = {
                customerName: name,
                customerAddress: address,
                items: items
            };

            try {
                const res = await fetch(`${API_URL}/Order`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("🎉 Order placed successfully!");
                    // Close modal
                    const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
                    modal.hide();
                    // Refresh list
                    fetchOrders();
                } else {
                    alert("Failed to place order: " + await res.text());
                }
            } catch (err) { alert("Network Error"); }
        }
    </script>
</body>
</html>
